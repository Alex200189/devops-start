name: Professional-CI

on: [push]

jobs:
  # СТАДИЯ 1: СБОРКА
  build-job:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build project
        run: |
          mkdir -p output
          echo "Building..." > output/app.log
          # Представь, что здесь мы компилируем код

  # СТАДИЯ 2: ТЕСТИРОВАНИЕ
  test-job:
    runs-on: ubuntu-latest
    needs: build-job  # Ждать, пока завершится сборка
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Unit Tests
        run: |
          echo "Running tests..."
          # Просто имитация теста: проверяем версию системы
          node -v
          python3 --version


